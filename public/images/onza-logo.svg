<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- ONZA Logo: Three converging wedge shapes to a sharp vertex -->
  <!-- Vertex: (400, 555) -->

  <!-- Left arm: thick tapered wedge -->
  <polygon points="
    128,130
    168,130
    401,553
    399,553
  " fill="#1A1A1A"/>

  <!-- Right arm: thick tapered wedge -->
  <polygon points="
    632,130
    672,130
    401,553
    399,553
  " fill="#1A1A1A"/>

  <!-- Inner line: thinner, with subtle curve, starts slightly right of center -->
  <path d="
    M 438,145
    L 450,145
    C 440,300 415,440 401,553
    L 399,553
    C 413,440 428,300 438,145
    Z
  " fill="#1A1A1A"/>

  <!-- Wordmark: "ONZA" using system Futura Light -->
  <text x="400" y="635"
        font-family="Futura"
        font-weight="300"
        font-size="48"
        letter-spacing="24"
        text-anchor="middle"
        fill="#1A1A1A">ONZA</text>
</svg>
